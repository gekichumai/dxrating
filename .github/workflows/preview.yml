name: Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
  push:
    branches-ignore:
      - main

concurrency:
  group: preview-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  preview-check:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    name: Preview Check

    steps:
      - name: Resolve preview metadata
        id: preview
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "head_sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
            echo "head_repo=${{ github.event.pull_request.head.repo.full_name }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          pr_json=$(gh pr list \
            --state open \
            --head "${GITHUB_REF_NAME}" \
            --json number,headRefOid \
            --jq '.[0] // empty')

          if [ -z "$pr_json" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No open PR found for ${GITHUB_REF_NAME}; skipping preview deployment."
            exit 0
          fi

          number=$(echo "$pr_json" | jq -r '.number')
          head_sha=$(echo "$pr_json" | jq -r '.headRefOid')

          {
            echo "found=true"
            echo "number=${number}"
            echo "head_sha=${head_sha}"
            echo "head_repo=${GITHUB_REPOSITORY}"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.preview.outputs.found == 'true'
        uses: actions/checkout@v6
        with:
          repository: ${{ steps.preview.outputs.head_repo }}
          ref: ${{ steps.preview.outputs.head_sha }}

      - name: Setup pnpm
        if: steps.preview.outputs.found == 'true'
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        if: steps.preview.outputs.found == 'true'
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - name: Cache Turbo
        if: steps.preview.outputs.found == 'true'
        uses: actions/cache@v5
        with:
          path: .turbo/cache
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Populate Bundle Information
        if: steps.preview.outputs.found == 'true'
        shell: bash
        run: |
          echo "VITE_GIT_COMMIT=${{ steps.preview.outputs.head_sha }}" >> ${GITHUB_ENV}
          echo "VITE_VERSION=pr-${{ steps.preview.outputs.number }}" >> ${GITHUB_ENV}
          echo "VITE_BUILD_NUMBER=${{ github.run_number }}" >> ${GITHUB_ENV}
          echo "VITE_BUILD_TIME=$(date --utc +%FT%TZ)" >> ${GITHUB_ENV}

      - name: Install dependencies
        if: steps.preview.outputs.found == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build
        if: steps.preview.outputs.found == 'true'
        shell: bash
        run: pnpm turbo run build --filter=@gekichumai/dxrating-web...
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          VITE_BACKEND_URL: https://miruku.dxrating.net
          VITE_BETTER_AUTH_URL: https://miruku.dxrating.net

      - name: Skip preview deployment for forked PRs
        if: steps.preview.outputs.found == 'true' && steps.preview.outputs.head_repo != github.repository
        run: echo "Built successfully. Preview deployment is skipped for forked pull requests."

      - name: Deploy to Cloudflare Workers
        if: steps.preview.outputs.found == 'true' && steps.preview.outputs.head_repo == github.repository
        id: deploy
        run: |
          set -euo pipefail
          DEPLOY_OUTPUT=$(pnpm --filter @gekichumai/dxrating-web exec wrangler deploy \
            --config=dist/server/wrangler.json \
            --name="dxrating-pr-${{ steps.preview.outputs.number }}" 2>&1 | tee /dev/stderr)
          DEPLOYMENT_URL=$(echo "$DEPLOY_OUTPUT" | grep -Eo 'https://[^[:space:]]+\.workers\.dev' | tail -1)
          test -n "$DEPLOYMENT_URL"
          echo "url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Comment PR with preview URL
        if: steps.preview.outputs.found == 'true' && steps.preview.outputs.head_repo == github.repository
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: preview-deploy
          message: |
            ### Preview Deployment

            | Name | Link |
            |------|------|
            | Latest commit | ${{ steps.preview.outputs.head_sha }} |
            | Preview URL | ${{ steps.deploy.outputs.url }} |

            > Built and deployed to Cloudflare Workers.

  delete-preview:
    if: github.event.action == 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
    name: Delete Preview

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'

      - name: Delete Cloudflare Worker preview
        run: |
          pnpm dlx wrangler delete --name="dxrating-pr-${{ github.event.pull_request.number }}" --force || \
            echo "::warning::Preview Worker dxrating-pr-${{ github.event.pull_request.number }} was not deleted. It may not exist."
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
