services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - .env.production
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dxrating"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ../..
      dockerfile: apps/backend/Dockerfile
    expose:
      - "3000"
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - default
      - coolify
    labels:
      - traefik.enable=true
      - traefik.http.routers.dxrating-backend.rule=PathPrefix(`/`)
      - traefik.http.routers.dxrating-backend.entrypoints=http
      - traefik.http.services.dxrating-backend.loadbalancer.server.port=3000

networks:
  coolify:
    external: true

volumes:
  pgdata:
